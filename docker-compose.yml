services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cupom_app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: cupom_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: cupom_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cupom
      MYSQL_USER: cupom
      MYSQL_PASSWORD: cupom
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: cupom_redis
    restart: unless-stopped

  node:
    image: node:20-alpine
    container_name: cupom_node
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_HOST: "0.0.0.0"
      VITE_PORT: "5173"

volumes:
  db_data:
